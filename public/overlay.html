<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%; height: 100%;
    background: rgba(0, 0, 0, 0.25);
    cursor: crosshair;
    overflow: hidden;
    user-select: none;
  }
  #instrucciones {
    position: fixed;
    top: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #111;
    color: #fff;
    padding: 10px 18px;
    border-radius: 8px;
    font-family: system-ui, sans-serif;
    font-size: 13px;
    border: 1px solid #333;
  }
  #instrucciones b { color: #f5a623; }
  #rect {
    position: fixed;
    border: 2px solid #4cdb85;
    background: rgba(76, 219, 133, 0.15);
    display: none;
  }
  #medida {
    position: fixed;
    background: #111;
    color: #4cdb85;
    padding: 3px 8px;
    font-family: monospace;
    font-size: 12px;
    border-radius: 4px;
    display: none;
  }
</style>
</head>
<body>
  <div id="instrucciones">Arrastra un rectángulo sobre el bloque de cuotas · <b>Esc</b> para cancelar</div>
  <div id="rect"></div>
  <div id="medida"></div>

  <script>
    let startX = 0, startY = 0;
    let arrastrando = false;
    let captureId = null;

    window.radarAPI.onOverlayDisplayInfo((data) => {
      captureId = data.captureId;
    });

    const rectEl = document.getElementById('rect');
    const medidaEl = document.getElementById('medida');

    document.addEventListener('mousedown', (e) => {
      arrastrando = true;
      startX = e.clientX;
      startY = e.clientY;
      rectEl.style.left = startX + 'px';
      rectEl.style.top = startY + 'px';
      rectEl.style.width = '0px';
      rectEl.style.height = '0px';
      rectEl.style.display = 'block';
    });

    document.addEventListener('mousemove', (e) => {
      if (!arrastrando) return;
      const x = Math.min(e.clientX, startX);
      const y = Math.min(e.clientY, startY);
      const w = Math.abs(e.clientX - startX);
      const h = Math.abs(e.clientY - startY);

      rectEl.style.left = x + 'px';
      rectEl.style.top = y + 'px';
      rectEl.style.width = w + 'px';
      rectEl.style.height = h + 'px';

      medidaEl.style.display = 'block';
      medidaEl.style.left = (x + w + 8) + 'px';
      medidaEl.style.top = (y) + 'px';
      medidaEl.textContent = w + ' x ' + h + ' px';
    });

    document.addEventListener('mouseup', (e) => {
      if (!arrastrando) return;
      arrastrando = false;

      const left = Math.min(e.clientX, startX);
      const top = Math.min(e.clientY, startY);
      const width = Math.abs(e.clientX - startX);
      const height = Math.abs(e.clientY - startY);

      if (width < 10 || height < 10) {
        // Selección demasiado chica, probablemente un clic accidental
        rectEl.style.display = 'none';
        medidaEl.style.display = 'none';
        return;
      }

      window.radarAPI.reportarRegion({
        region: { left, top, width, height },
        captureId,
      });
    });

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') {
        window.radarAPI.cancelarCalibracion();
      }
    });
  </script>
</body>
</html>
